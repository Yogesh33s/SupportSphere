# nginx configuration for the SupportSphere frontend container.
# It serves static frontend files and also forwards /api requests to the backend
# container using the Docker Compose service name: backend.

server {
    listen 80;
    server_name _;

    # Static frontend files are copied here by the frontend Dockerfile.
    root /usr/share/nginx/html;
    index index.html;

    # Serve the single frontend page and static assets.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional Docker network path:
    # http://frontend-container/api/... -> http://backend:8080/api/...
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
